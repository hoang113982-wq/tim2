<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Heart</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="heart"></canvas>

<script>

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function heart(t){
let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
return {x,y};
}

let particles=[];

for(let i=0;i<3000;i++){

let t=Math.random()*Math.PI*2;
let pos=heart(t);

particles.push({
x:pos.x+(Math.random()-0.5)*0.5,
y:pos.y+(Math.random()-0.5)*0.5,
size:Math.random()*2,
alpha:Math.random()
});

}

let progress=0;
let time=0;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let scale=15;

if(progress<1){
progress+=0.01;
}

if(progress>=1){
scale=15+Math.sin(time)*3;
time+=0.3;
}

particles.forEach(p=>{

let t=Math.atan2(p.y,p.x);
let limit=progress*Math.PI*2;

if(t<limit){

let x=canvas.width/2+p.x*scale;
let y=canvas.height/2-p.y*scale;

ctx.beginPath();
ctx.arc(x,y,p.size,0,Math.PI*2);

ctx.fillStyle=`rgba(255,80,150,${p.alpha})`;

ctx.shadowColor="rgb(0,0,0)";
ctx.shadowBlur=15;

ctx.fill();

}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
