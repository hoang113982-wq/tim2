<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heart</title>

<style>
body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.heart{
    width:120px;
    height:120px;
    background:red;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
}

.heart:before,
.heart:after{
    content:"";
    width:120px;
    height:120px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.heart:before{
    top:-60px;
}

.heart:after{
    left:60px;
}

@keyframes beat{
    0%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.3);}
    100%{transform:rotate(-45deg) scale(1);}
}
</style>
</head>

<body>

<div class="heart"></div>

</body>
</html>
